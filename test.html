<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>T Play TV | Smart TV Experience</title>
    <link rel="icon" href="https://i.postimg.cc/RCnCv14W/T-Play.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e50914;
            --primary-hover: #ff1a2a;
            --bg-dark: #000000;
            --bg-overlay: rgba(0, 0, 0, 0.85);
            --bg-sidebar: rgba(18, 18, 24, 0.95);
            --text-white: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-light: rgba(255, 255, 255, 0.1);
            --focus-ring: 0 0 0 3px #e50914, 0 0 0 6px rgba(229, 9, 20, 0.3);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* TV OPTIMIZED LAYOUT - FULLSCREEN PLAYER WITH OVERLAY */
        .tv-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* VIDEO PLAYER FULLSCREEN BACKGROUND */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1;
        }

        #liveVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #posterImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* TV OVERLAY UI - LIKE POPULAR PLATFORMS */
        .tv-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
            z-index: 10;
            padding: 80px 40px 40px 40px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .tv-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* CHANNEL INFO BAR - TOP LEFT */
        .channel-info {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 15;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 40px;
            border-left: 4px solid var(--primary);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .channel-info.visible {
            opacity: 1;
        }

        .channel-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .channel-category {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* REMOTE CONTROL BAR - BOTTOM CENTER */
        .remote-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tv-remote-btn {
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50px;
            font-size: 1.8rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .tv-remote-btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
            transform: scale(1.05);
            background: var(--primary);
        }

        .tv-remote-btn.small {
            width: 55px;
            height: 55px;
            font-size: 1.3rem;
        }

        .tv-remote-btn.primary {
            background: var(--primary);
            border-color: var(--primary);
        }

        .control-group {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 60px;
        }

        .volume-slider {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        .tv-select {
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }

        /* CHANNEL SIDEBAR - RIGHT SIDE (LIKE MODERN TV APPS) */
        .channels-sidebar {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 380px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            z-index: 20;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-light);
        }

        .channels-sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .channel-stats {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .search-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 14px 18px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
        }

        .search-input:focus {
            outline: none;
            background: rgba(255,255,255,0.15);
        }

        .categories-scroll {
            padding: 16px 20px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            border-bottom: 1px solid var(--border-light);
        }

        .category-chip {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            margin-right: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .category-chip.active {
            background: var(--primary);
        }

        .category-chip:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .channel-list-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .channel-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
        }

        .channel-row:focus-visible {
            outline: none;
            background: rgba(229, 9, 20, 0.2);
            box-shadow: var(--focus-ring);
        }

        .channel-row.active {
            background: rgba(229, 9, 20, 0.25);
            border-left: 3px solid var(--primary);
        }

        .channel-row-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            background: #333;
        }

        .channel-row-info {
            flex: 1;
        }

        .channel-row-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .channel-row-cat {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .live-tag {
            background: var(--primary);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* LOADING & ERROR */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 50;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(229,9,20,0.3);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* GUIDE BUTTON */
        .guide-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 15;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            border: 1px solid var(--border-light);
            transition: var(--transition);
        }

        .guide-btn:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        @media (max-width: 768px) {
            .channels-sidebar { width: 100%; }
            .tv-remote-btn { width: 55px; height: 55px; font-size: 1.4rem; }
            .remote-bar { gap: 12px; }
            .tv-overlay { padding: 60px 20px 30px; }
        }
    </style>
</head>
<body>
<div class="tv-wrapper">
    <!-- VIDEO PLAYER -->
    <div class="video-container">
        <img id="posterImage" src="https://i.postimg.cc/Pr9sC68t/T-Play-Cover.jpg" alt="">
        <video id="liveVideo" playsinline webkit-playsinline></video>
    </div>

    <!-- CHANNEL INFO OVERLAY -->
    <div class="channel-info" id="channelInfo">
        <div class="channel-name" id="currentChannelName">Loading...</div>
        <div class="channel-category" id="currentChannelCat">---</div>
    </div>

    <!-- GUIDE BUTTON -->
    <button class="guide-btn" id="guideBtn"><i class="fas fa-list-ul"></i> Guide</button>

    <!-- TV REMOTE OVERLAY (BOTTOM) -->
    <div class="tv-overlay" id="tvOverlay">
        <div class="remote-bar">
            <button class="tv-remote-btn small" id="prevBtn" title="Previous"><i class="fas fa-chevron-left"></i></button>
            <button class="tv-remote-btn primary" id="playPauseBtn" title="Play/Pause"><i class="fas fa-play"></i></button>
            <button class="tv-remote-btn small" id="nextBtn" title="Next"><i class="fas fa-chevron-right"></i></button>
            <button class="tv-remote-btn small" id="zoomBtn" title="Zoom"><i class="fas fa-expand-alt"></i></button>
            <button class="tv-remote-btn small" id="fullscreenBtn" title="Fullscreen"><i class="fas fa-expand"></i></button>
            <div class="control-group">
                <button class="tv-remote-btn small" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
            </div>
            <select class="tv-select" id="sourceSelect">
                <option value="0">Main</option>
            </select>
            <select class="tv-select" id="qualitySelect">
                <option value="auto">Auto</option>
            </select>
        </div>
        <div style="text-align: center; margin-top: 12px; font-size: 12px; color: rgba(255,255,255,0.5);">
            <i class="fas fa-arrows-alt"></i> Arrow Keys: Change Channel &nbsp;&nbsp;|&nbsp;&nbsp;
            <i class="fas fa-check"></i> Enter/Space: Play/Pause &nbsp;&nbsp;|&nbsp;&nbsp;
            <i class="fas fa-search"></i> Guide: Channel List
        </div>
    </div>

    <!-- CHANNEL SIDEBAR / GUIDE -->
    <div class="channels-sidebar" id="channelsSidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-tv"></i> T Play</h2>
            <div class="channel-stats" id="channelStats">0 Channels</div>
        </div>
        <div class="search-section">
            <input type="text" class="search-input" id="channelSearch" placeholder="Search channels...">
        </div>
        <div class="categories-scroll" id="categoriesList"></div>
        <div class="channel-list-scroll" id="channelList"></div>
    </div>

    <!-- LOADING OVERLAY -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="spinner"></div>
        <div style="font-size: 1.1rem;">Loading channel...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.12/shaka-player.ui.js"></script>

<script>
    // REALISTIC CHANNEL DATA (Popular TV Channels)
    const CHANNELS = [
        { name: "Star Plus", category: "Entertainment", img: "https://i.postimg.cc/4xwCQFwN/starplus.png", sources: [{ name: "HD", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Colors TV", category: "Entertainment", img: "https://i.postimg.cc/tCQGbwLx/colors.png", sources: [{ name: "Main", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Sony SAB", category: "Entertainment", img: "https://i.postimg.cc/7hVvJ0bM/sony-max.png", sources: [{ name: "Stream", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Zee TV", category: "Entertainment", img: "https://i.postimg.cc/28TZNY4B/zeetelugu.png", sources: [{ name: "Live", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "DD National", category: "News", img: "https://i.postimg.cc/NjFkS8Xc/dd-national.png", sources: [{ name: "News", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Republic TV", category: "News", img: "https://i.postimg.cc/Dw4k2Bqm/cnn.png", sources: [{ name: "HD", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "CNN News18", category: "News", img: "https://i.postimg.cc/Dw4k2Bqm/cnn.png", sources: [{ name: "Live", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "MTV India", category: "Music", img: "https://i.postimg.cc/8PjV2vXK/mtv.png", sources: [{ name: "Music", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "9XM", category: "Music", img: "https://i.postimg.cc/8PjV2vXK/mtv.png", sources: [{ name: "HD", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Star Sports 1", category: "Sports", img: "https://i.postimg.cc/15HQFsqW/sports.png", sources: [{ name: "4K", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Sony Ten", category: "Sports", img: "https://i.postimg.cc/15HQFsqW/sports.png", sources: [{ name: "Live", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Cartoon Network", category: "Kids", img: "https://i.postimg.cc/wjN9pqRH/cartoon.png", sources: [{ name: "Kids", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Nickelodeon", category: "Kids", img: "https://i.postimg.cc/wjN9pqRH/cartoon.png", sources: [{ name: "HD", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Sun TV", category: "Tamil", img: "https://i.postimg.cc/6pXhr0Z4/suntv.png", sources: [{ name: "Tamil", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] },
        { name: "Zee Telugu", category: "Telugu", img: "https://i.postimg.cc/28TZNY4B/zeetelugu.png", sources: [{ name: "Telugu", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }] }
    ];

    const CATEGORIES = ["All", "Entertainment", "News", "Music", "Sports", "Kids", "Tamil", "Telugu"];

    let hls = null;
    let shakaPlayer = null;
    let currentChannelIndex = 0;
    let currentSources = [];
    let currentBackupIdx = 0;
    let zoomIndex = 0;
    let currentCategory = "All";
    let filteredChannels = [...CHANNELS];
    let sidebarOpen = false;
    let overlayTimeout;

    // DOM elements
    const video = document.getElementById("liveVideo");
    const poster = document.getElementById("posterImage");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const channelInfoDiv = document.getElementById("channelInfo");
    const tvOverlay = document.getElementById("tvOverlay");
    const currentChannelNameSpan = document.getElementById("currentChannelName");
    const currentChannelCatSpan = document.getElementById("currentChannelCat");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const zoomBtn = document.getElementById("zoomBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const muteBtn = document.getElementById("muteBtn");
    const volumeSlider = document.getElementById("volumeSlider");
    const sourceSelect = document.getElementById("sourceSelect");
    const qualitySelect = document.getElementById("qualitySelect");
    const guideBtn = document.getElementById("guideBtn");
    const channelsSidebar = document.getElementById("channelsSidebar");
    const channelSearch = document.getElementById("channelSearch");
    const categoriesList = document.getElementById("categoriesList");
    const channelListDiv = document.getElementById("channelList");
    const channelStats = document.getElementById("channelStats");

    // Helper functions
    function showLoading(show) {
        loadingOverlay.style.display = show ? "flex" : "none";
    }

    function showChannelInfo() {
        channelInfoDiv.classList.add("visible");
        clearTimeout(window.infoTimeout);
        window.infoTimeout = setTimeout(() => {
            channelInfoDiv.classList.remove("visible");
        }, 3000);
    }

    function showRemoteOverlay() {
        tvOverlay.classList.add("visible");
        clearTimeout(window.overlayTimeout);
        window.overlayTimeout = setTimeout(() => {
            if (!sidebarOpen) tvOverlay.classList.remove("visible");
        }, 4000);
    }

    function cleanupPlayers() {
        if (hls) { hls.destroy(); hls = null; }
        if (shakaPlayer) { shakaPlayer.unload(); shakaPlayer.destroy(); shakaPlayer = null; }
        video.src = "";
    }

    function loadSource(sourceIdx) {
        cleanupPlayers();
        if (!currentSources[sourceIdx]) return;
        const src = currentSources[sourceIdx];
        showLoading(true);
        poster.style.opacity = "0.5";

        if (src.type === 'dash') {
            if (!shaka.Player.isBrowserSupported()) return;
            if (!shakaPlayer) shakaPlayer = new shaka.Player(video);
            shakaPlayer.load(src.url).then(() => {
                showLoading(false);
                poster.style.opacity = "0";
                video.play().catch(e => console.log);
            }).catch(() => { showLoading(false); });
            return;
        }

        // HLS
        if (Hls.isSupported()) {
            hls = new Hls({ maxBufferLength: 30 });
            hls.loadSource(src.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                showLoading(false);
                poster.style.opacity = "0";
                video.play().catch(e => console.log);
                populateQualityMenu();
            });
            hls.on(Hls.Events.ERROR, (_, data) => {
                if (data.fatal) {
                    if (currentBackupIdx + 1 < currentSources.length) {
                        currentBackupIdx++;
                        loadSource(currentBackupIdx);
                    } else {
                        showLoading(false);
                    }
                }
            });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = src.url;
            video.addEventListener("loadedmetadata", () => {
                showLoading(false);
                poster.style.opacity = "0";
                video.play().catch(e => console.log);
            });
        }
    }

    function populateQualityMenu() {
        if (!hls || !hls.levels) return;
        qualitySelect.innerHTML = '<option value="-1">Auto</option>';
        hls.levels.forEach((level, idx) => {
            const opt = document.createElement("option");
            opt.value = idx;
            opt.textContent = level.height + "p";
            qualitySelect.appendChild(opt);
        });
        hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
            qualitySelect.value = data.level;
        });
    }

    function loadChannel(index) {
        if (index < 0) index = 0;
        if (index >= filteredChannels.length) index = filteredChannels.length - 1;
        const channel = filteredChannels[index];
        if (!channel) return;
        
        currentChannelIndex = index;
        currentSources = channel.sources;
        currentBackupIdx = 0;
        
        currentChannelNameSpan.textContent = channel.name;
        currentChannelCatSpan.textContent = channel.category;
        showChannelInfo();
        
        // Update source dropdown
        sourceSelect.innerHTML = "";
        channel.sources.forEach((s, i) => {
            const opt = document.createElement("option");
            opt.value = i;
            opt.textContent = s.name;
            sourceSelect.appendChild(opt);
        });
        
        loadSource(0);
        renderChannelList();
        showRemoteOverlay();
    }

    function renderChannelList() {
        channelListDiv.innerHTML = "";
        filteredChannels.forEach((ch, idx) => {
            const row = document.createElement("div");
            row.className = "channel-row";
            if (idx === currentChannelIndex) row.classList.add("active");
            row.innerHTML = `
                <img class="channel-row-img" src="${ch.img}" onerror="this.src='https://i.postimg.cc/RCnCv14W/T-Play.png'">
                <div class="channel-row-info">
                    <div class="channel-row-name">${ch.name}</div>
                    <div class="channel-row-cat">${ch.category}</div>
                </div>
                <div class="live-tag">LIVE</div>
            `;
            row.addEventListener("click", () => {
                loadChannel(idx);
                if (sidebarOpen) toggleSidebar();
            });
            row.setAttribute("tabindex", "0");
            channelListDiv.appendChild(row);
        });
        channelStats.textContent = `${filteredChannels.length} Channels`;
    }

    function renderCategories() {
        categoriesList.innerHTML = "";
        CATEGORIES.forEach(cat => {
            const chip = document.createElement("span");
            chip.className = "category-chip";
            if (cat === currentCategory) chip.classList.add("active");
            chip.textContent = cat;
            chip.addEventListener("click", () => {
                currentCategory = cat;
                if (cat === "All") filteredChannels = [...CHANNELS];
                else filteredChannels = CHANNELS.filter(ch => ch.category === cat);
                renderChannelList();
                renderCategories();
                if (filteredChannels.length) loadChannel(0);
            });
            categoriesList.appendChild(chip);
        });
    }

    function searchChannels() {
        const term = channelSearch.value.toLowerCase();
        if (!term) {
            filteredChannels = currentCategory === "All" ? [...CHANNELS] : CHANNELS.filter(ch => ch.category === currentCategory);
        } else {
            filteredChannels = CHANNELS.filter(ch => 
                ch.name.toLowerCase().includes(term) && 
                (currentCategory === "All" || ch.category === currentCategory)
            );
        }
        renderChannelList();
        if (filteredChannels.length) loadChannel(0);
    }

    function toggleSidebar() {
        sidebarOpen = !sidebarOpen;
        if (sidebarOpen) {
            channelsSidebar.classList.add("open");
            renderChannelList();
            renderCategories();
            tvOverlay.classList.remove("visible");
        } else {
            channelsSidebar.classList.remove("open");
            showRemoteOverlay();
        }
    }

    // Remote control functions
    function prevChannel() {
        if (filteredChannels.length) {
            loadChannel((currentChannelIndex - 1 + filteredChannels.length) % filteredChannels.length);
        }
    }
    function nextChannel() {
        if (filteredChannels.length) {
            loadChannel((currentChannelIndex + 1) % filteredChannels.length);
        }
    }
    function togglePlayPause() {
        if (video.paused) video.play();
        else video.pause();
        updatePlayPauseIcon();
    }
    function updatePlayPauseIcon() {
        playPauseBtn.innerHTML = video.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
    }
    function toggleMute() {
        video.muted = !video.muted;
        volumeSlider.value = video.muted ? 0 : video.volume;
        muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    }
    function cycleZoom() {
        const modes = ["contain", "cover", "fill"];
        zoomIndex = (zoomIndex + 1) % modes.length;
        video.style.objectFit = modes[zoomIndex];
    }
    function toggleFullscreen() {
        const container = document.querySelector('.video-container');
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(e => console.log);
        } else {
            document.exitFullscreen();
        }
    }

    // Keyboard remote control (TV remote)
    function handleRemoteKeys(e) {
        const key = e.key;
        if (key === "ArrowLeft") { e.preventDefault(); prevChannel(); showRemoteOverlay(); }
        else if (key === "ArrowRight") { e.preventDefault(); nextChannel(); showRemoteOverlay(); }
        else if (key === " " || key === "Space" || key === "Enter") { e.preventDefault(); togglePlayPause(); showRemoteOverlay(); }
        else if (key === "ArrowUp") { e.preventDefault(); let v = Math.min(1, video.volume + 0.05); video.volume = v; volumeSlider.value = v; if(video.muted) video.muted = false; updateMuteIcon(); showRemoteOverlay(); }
        else if (key === "ArrowDown") { e.preventDefault(); let v = Math.max(0, video.volume - 0.05); video.volume = v; volumeSlider.value = v; updateMuteIcon(); showRemoteOverlay(); }
        else if (key === "f" || key === "F") { e.preventDefault(); toggleFullscreen(); }
        else if (key === "m" || key === "M") { e.preventDefault(); toggleMute(); showRemoteOverlay(); }
        else if (key === "z" || key === "Z") { e.preventDefault(); cycleZoom(); showRemoteOverlay(); }
        else if (key === "g" || key === "G" || key === "Escape") { e.preventDefault(); toggleSidebar(); }
    }

    function updateMuteIcon() {
        muteBtn.innerHTML = (video.muted || video.volume === 0) ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
    }

    // Event listeners
    function init() {
        renderCategories();
        renderChannelList();
        loadChannel(0);
        
        video.addEventListener("play", updatePlayPauseIcon);
        video.addEventListener("pause", updatePlayPauseIcon);
        video.addEventListener("volumechange", updateMuteIcon);
        
        volumeSlider.addEventListener("input", (e) => {
            video.volume = parseFloat(e.target.value);
            video.muted = false;
            updateMuteIcon();
        });
        
        playPauseBtn.addEventListener("click", togglePlayPause);
        prevBtn.addEventListener("click", prevChannel);
        nextBtn.addEventListener("click", nextChannel);
        zoomBtn.addEventListener("click", cycleZoom);
        fullscreenBtn.addEventListener("click", toggleFullscreen);
        muteBtn.addEventListener("click", toggleMute);
        guideBtn.addEventListener("click", toggleSidebar);
        sourceSelect.addEventListener("change", (e) => loadSource(parseInt(e.target.value)));
        qualitySelect.addEventListener("change", (e) => {
            if (hls && hls.levels) {
                const val = parseInt(e.target.value);
                hls.currentLevel = val === -1 ? -1 : val;
            }
        });
        channelSearch.addEventListener("input", searchChannels);
        
        window.addEventListener("keydown", handleRemoteKeys);
        
        // Hide overlay on video click, show on remote
        video.addEventListener("click", () => showRemoteOverlay());
        
        setInterval(() => {
            if (!sidebarOpen && !tvOverlay.classList.contains("visible")) {
                // keep clean
            }
        }, 100);
    }
    
    init();
</script>
</body>
</html>
