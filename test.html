<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>T Play TV | Premium Smart TV</title>
    <link rel="icon" href="https://i.postimg.cc/RCnCv14W/T-Play.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e50914;
            --primary-dark: #b80710;
            --bg-black: #000000;
            --bg-overlay: rgba(0, 0, 0, 0.85);
            --bg-card: #1a1a1a;
            --text-white: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --focus-ring: 0 0 0 3px #e50914, 0 0 0 6px rgba(229, 9, 20, 0.3);
            --transition: all 0.2s ease;
        }

        body {
            background: var(--bg-black);
            color: var(--text-white);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .tv-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        /* Video Player */
        .video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1;
        }

        #liveVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #posterImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* Channel Info Bar */
        .channel-info-bar {
            position: absolute;
            top: 80px;
            left: 60px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            padding: 16px 28px;
            border-radius: 60px;
            border-left: 5px solid var(--primary);
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .channel-info-bar.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .channel-name-large {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .channel-category {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-top: 5px;
        }

        /* Remote Hint */
        .remote-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: var(--text-muted);
            z-index: 15;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .remote-hint.visible {
            opacity: 1;
        }

        /* GUIDE MENU - FULL SCREEN OVERLAY */
        .guide-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(25px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .guide-menu.open {
            transform: translateY(0);
        }

        .guide-header {
            padding: 30px 50px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .guide-header h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .guide-categories {
            display: flex;
            gap: 15px;
            padding: 20px 50px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .guide-cat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .guide-cat-item.active {
            background: var(--primary);
        }

        .guide-cat-item:focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
        }

        .guide-channels-grid {
            flex: 1;
            overflow-y: auto;
            padding: 30px 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .guide-channel-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .guide-channel-card:focus-visible {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--focus-ring);
            background: rgba(229, 9, 20, 0.15);
        }

        .guide-channel-card.active {
            background: rgba(229, 9, 20, 0.2);
            border-color: var(--primary);
        }

        .guide-channel-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            background: #333;
        }

        .guide-channel-details {
            flex: 1;
        }

        .guide-channel-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .guide-channel-cat {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .guide-live-badge {
            background: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        /* Servers Menu */
        .servers-menu {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            min-width: 300px;
            z-index: 90;
            padding: 15px 0;
            opacity: 0;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .servers-menu.open {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .server-item {
            padding: 12px 24px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .server-item:focus-visible {
            outline: none;
            background: rgba(229, 9, 20, 0.3);
        }

        .server-item.active {
            background: rgba(229, 9, 20, 0.5);
        }

        /* Loading */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 50;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(229, 9, 20, 0.3);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Favorite Toast */
        .favorite-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 30px;
            border-radius: 50px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .guide-channels-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); padding: 20px; }
            .guide-header { padding: 20px; }
            .guide-categories { padding: 15px 20px; }
        }
    </style>
</head>
<body>
<div class="tv-container">
    <div class="video-wrapper">
        <img id="posterImage" src="https://i.postimg.cc/Pr9sC68t/T-Play-Cover.jpg" alt="">
        <video id="liveVideo" playsinline webkit-playsinline></video>
    </div>

    <div class="channel-info-bar" id="channelInfoBar">
        <div class="channel-name-large" id="currentChannelName">Loading...</div>
        <div class="channel-category" id="currentChannelCat">---</div>
    </div>

    <div class="remote-hint" id="remoteHint">
        <i class="fas fa-arrows-alt"></i> ←/→ Change | ↑ Guide | ↓ Servers | ⏎ Play | ✦ ESC Close | ★ Double-click Favorite
    </div>

    <!-- GUIDE MENU -->
    <div class="guide-menu" id="guideMenu">
        <div class="guide-header">
            <h1><i class="fas fa-tv"></i> Channel Guide</h1>
        </div>
        <div class="guide-categories" id="guideCategories"></div>
        <div class="guide-channels-grid" id="guideChannelsGrid"></div>
    </div>

    <!-- SERVERS MENU -->
    <div class="servers-menu" id="serversMenu">
        <div id="serversList"></div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="spinner"></div>
        <div>Loading stream...</div>
    </div>

    <div class="favorite-toast" id="favoriteToast">
        <i class="fas fa-heart" style="color: #e50914;"></i> Added to Favorites
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.12/shaka-player.ui.js"></script>
<script src="main.js"></script>
<script>
    // Main TV App - Data collected from main.js (channels array expected)
    // Fallback channels if main.js not loaded
    window.channelsData = window.channelsData || [
        { name: "Star Plus", category: "Entertainment", img: "https://i.postimg.cc/4xwCQFwN/starplus.png", sources: [{ name: "HD Source", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }], favorite: false },
        { name: "Colors TV", category: "Entertainment", img: "https://i.postimg.cc/tCQGbwLx/colors.png", sources: [{ name: "Main", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }], favorite: false },
        { name: "Sony MAX", category: "Movies", img: "https://i.postimg.cc/7hVvJ0bM/sony-max.png", sources: [{ name: "HD", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }], favorite: false },
        { name: "DD National", category: "News", img: "https://i.postimg.cc/NjFkS8Xc/dd-national.png", sources: [{ name: "News", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }], favorite: false },
        { name: "Republic TV", category: "News", img: "https://i.postimg.cc/Dw4k2Bqm/cnn.png", sources: [{ name: "Live", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }], favorite: false },
        { name: "MTV India", category: "Music", img: "https://i.postimg.cc/8PjV2vXK/mtv.png", sources: [{ name: "Music", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }], favorite: false },
        { name: "Star Sports 1", category: "Sports", img: "https://i.postimg.cc/15HQFsqW/sports.png", sources: [{ name: "4K", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }], favorite: false },
        { name: "Cartoon Network", category: "Kids", img: "https://i.postimg.cc/wjN9pqRH/cartoon.png", sources: [{ name: "Kids", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }], favorite: false },
        { name: "Sun TV", category: "Tamil", img: "https://i.postimg.cc/6pXhr0Z4/suntv.png", sources: [{ name: "Tamil", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls" }], favorite: false }
    ];

    let channels = [];
    let currentChannelIndex = 0;
    let currentSources = [];
    let currentSourceIndex = 0;
    let hls = null;
    let shakaPlayer = null;
    let zoomIndex = 0;
    let guideOpen = false;
    let serversOpen = false;
    let favorites = new Set();
    let doubleClickTimer = null;
    let currentCategory = "All";
    let filteredChannels = [];

    // DOM elements
    const video = document.getElementById("liveVideo");
    const poster = document.getElementById("posterImage");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const channelInfoBar = document.getElementById("channelInfoBar");
    const remoteHint = document.getElementById("remoteHint");
    const guideMenu = document.getElementById("guideMenu");
    const serversMenu = document.getElementById("serversMenu");
    const serversList = document.getElementById("serversList");
    const guideCategoriesDiv = document.getElementById("guideCategories");
    const guideChannelsGrid = document.getElementById("guideChannelsGrid");
    const currentChannelNameSpan = document.getElementById("currentChannelName");
    const currentChannelCatSpan = document.getElementById("currentChannelCat");
    const favoriteToast = document.getElementById("favoriteToast");

    // Helper functions
    function showLoading(show) {
        loadingOverlay.style.display = show ? "flex" : "none";
    }

    function showChannelInfo() {
        channelInfoBar.classList.add("visible");
        remoteHint.classList.add("visible");
        setTimeout(() => {
            channelInfoBar.classList.remove("visible");
            setTimeout(() => remoteHint.classList.remove("visible"), 3000);
        }, 4000);
    }

    function showFavoriteToast() {
        favoriteToast.style.opacity = "1";
        setTimeout(() => favoriteToast.style.opacity = "0", 1500);
    }

    function cleanupPlayers() {
        if (hls) { hls.destroy(); hls = null; }
        if (shakaPlayer) { shakaPlayer.unload(); shakaPlayer.destroy(); shakaPlayer = null; }
        video.src = "";
    }

    function loadSource(sourceIdx) {
        if (!currentSources || !currentSources[sourceIdx]) return;
        const src = currentSources[sourceIdx];
        showLoading(true);
        poster.style.opacity = "0.5";
        cleanupPlayers();

        if (src.type === 'dash') {
            if (!shaka.Player.isBrowserSupported()) { showLoading(false); return; }
            if (!shakaPlayer) shakaPlayer = new shaka.Player(video);
            shakaPlayer.load(src.url).then(() => {
                showLoading(false);
                poster.style.opacity = "0";
                video.play().catch(e => console.log);
            }).catch(() => showLoading(false));
            return;
        }

        if (Hls.isSupported()) {
            hls = new Hls({ maxBufferLength: 30 });
            hls.loadSource(src.url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                showLoading(false);
                poster.style.opacity = "0";
                video.play().catch(e => console.log);
            });
            hls.on(Hls.Events.ERROR, (_, data) => {
                if (data.fatal && currentSourceIndex + 1 < currentSources.length) {
                    currentSourceIndex++;
                    loadSource(currentSourceIndex);
                } else if (data.fatal) {
                    showLoading(false);
                }
            });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = src.url;
            video.addEventListener("loadedmetadata", () => {
                showLoading(false);
                poster.style.opacity = "0";
                video.play().catch(e => console.log);
            });
        }
    }

    function loadChannel(index) {
        if (index < 0) index = 0;
        if (index >= filteredChannels.length) index = filteredChannels.length - 1;
        const channel = filteredChannels[index];
        if (!channel) return;

        currentChannelIndex = index;
        currentSources = channel.sources;
        currentSourceIndex = 0;
        
        currentChannelNameSpan.textContent = channel.name;
        currentChannelCatSpan.textContent = channel.category;
        showChannelInfo();
        
        loadSource(0);
        updateGuideActiveChannel();
        closeAllMenus();
    }

    function updateGuideActiveChannel() {
        document.querySelectorAll('.guide-channel-card').forEach((card, idx) => {
            if (idx === currentChannelIndex) card.classList.add('active');
            else card.classList.remove('active');
        });
    }

    function renderGuide() {
        const cats = ["All", ...new Set(channels.map(ch => ch.category))];
        guideCategoriesDiv.innerHTML = "";
        cats.forEach(cat => {
            const catBtn = document.createElement("div");
            catBtn.className = "guide-cat-item";
            if (cat === currentCategory) catBtn.classList.add("active");
            catBtn.textContent = cat;
            catBtn.setAttribute("tabindex", "0");
            catBtn.addEventListener("click", () => {
                currentCategory = cat;
                filterAndRenderGuide();
            });
            guideCategoriesDiv.appendChild(catBtn);
        });

        filterAndRenderGuide();
    }

    function filterAndRenderGuide() {
        let displayChannels = currentCategory === "All" ? [...channels] : channels.filter(ch => ch.category === currentCategory);
        filteredChannels = displayChannels;
        
        guideChannelsGrid.innerHTML = "";
        displayChannels.forEach((ch, idx) => {
            const card = document.createElement("div");
            card.className = "guide-channel-card";
            if (idx === currentChannelIndex && !guideOpen) card.classList.add("active");
            card.setAttribute("tabindex", "0");
            card.innerHTML = `
                <img class="guide-channel-img" src="${ch.img}" onerror="this.src='https://i.postimg.cc/RCnCv14W/T-Play.png'">
                <div class="guide-channel-details">
                    <div class="guide-channel-name">${ch.name}</div>
                    <div class="guide-channel-cat">${ch.category}</div>
                </div>
                ${favorites.has(ch.name) ? '<div class="guide-live-badge"><i class="fas fa-star"></i></div>' : '<div class="guide-live-badge">LIVE</div>'}
            `;
            card.addEventListener("click", () => {
                loadChannel(idx);
                closeGuide();
            });
            guideChannelsGrid.appendChild(card);
        });
    }

    function openGuide() {
        closeServers();
        guideOpen = true;
        guideMenu.classList.add("open");
        renderGuide();
        setTimeout(() => {
            const firstCat = document.querySelector('.guide-cat-item');
            if (firstCat) firstCat.focus();
        }, 100);
    }

    function closeGuide() {
        guideOpen = false;
        guideMenu.classList.remove("open");
    }

    function openServers() {
        if (!currentSources) return;
        closeGuide();
        serversList.innerHTML = "";
        currentSources.forEach((src, idx) => {
            const item = document.createElement("div");
            item.className = "server-item";
            if (idx === currentSourceIndex) item.classList.add("active");
            item.innerHTML = `<i class="fas fa-server"></i> ${src.name} ${src.drm ? '(DRM)' : ''}`;
            item.setAttribute("tabindex", "0");
            item.addEventListener("click", () => {
                currentSourceIndex = idx;
                loadSource(idx);
                closeServers();
            });
            serversList.appendChild(item);
        });
        serversOpen = true;
        serversMenu.classList.add("open");
    }

    function closeServers() {
        serversOpen = false;
        serversMenu.classList.remove("open");
    }

    function closeAllMenus() {
        if (guideOpen) closeGuide();
        if (serversOpen) closeServers();
    }

    function toggleFavorite() {
        const channel = filteredChannels[currentChannelIndex];
        if (!channel) return;
        if (favorites.has(channel.name)) {
            favorites.delete(channel.name);
            showFavoriteToastMessage("Removed from Favorites", "far fa-heart");
        } else {
            favorites.add(channel.name);
            showFavoriteToastMessage("Added to Favorites", "fas fa-heart");
        }
    }

    function showFavoriteToastMessage(msg, icon) {
        favoriteToast.innerHTML = `<i class="${icon}" style="color:#e50914"></i> ${msg}`;
        favoriteToast.style.opacity = "1";
        setTimeout(() => favoriteToast.style.opacity = "0", 1500);
    }

    // Remote Control Handlers
    function handleRemoteKeys(e) {
        const key = e.key;
        
        // ESC/Back - Close menus
        if (key === "Escape") {
            e.preventDefault();
            if (guideOpen) closeGuide();
            else if (serversOpen) closeServers();
            else closeAllMenus();
            return;
        }
        
        // Guide open navigation
        if (guideOpen) {
            if (key === "ArrowLeft" || key === "ArrowRight") {
                e.preventDefault();
                const cats = document.querySelectorAll('.guide-cat-item');
                let activeIndex = Array.from(cats).findIndex(c => c.classList.contains('active'));
                if (key === "ArrowLeft") activeIndex = (activeIndex - 1 + cats.length) % cats.length;
                else activeIndex = (activeIndex + 1) % cats.length;
                if (cats[activeIndex]) {
                    cats[activeIndex].click();
                    cats[activeIndex].focus();
                }
            }
            else if (key === "ArrowUp" || key === "ArrowDown") {
                e.preventDefault();
                const cards = document.querySelectorAll('.guide-channel-card');
                if (cards.length) {
                    let focused = document.activeElement;
                    let currentFocusIdx = Array.from(cards).findIndex(c => c === focused);
                    if (currentFocusIdx === -1) currentFocusIdx = 0;
                    if (key === "ArrowUp") currentFocusIdx = (currentFocusIdx - 1 + cards.length) % cards.length;
                    else currentFocusIdx = (currentFocusIdx + 1) % cards.length;
                    cards[currentFocusIdx].focus();
                }
            }
            else if (key === "Enter" || key === " ") {
                e.preventDefault();
                const focusedCard = document.activeElement;
                if (focusedCard && focusedCard.classList.contains('guide-channel-card')) {
                    focusedCard.click();
                }
            }
            return;
        }
        
        // Servers menu navigation
        if (serversOpen) {
            if (key === "ArrowUp" || key === "ArrowDown") {
                e.preventDefault();
                const items = document.querySelectorAll('.server-item');
                let activeIdx = Array.from(items).findIndex(i => i.classList.contains('active'));
                if (key === "ArrowUp") activeIdx = (activeIdx - 1 + items.length) % items.length;
                else activeIdx = (activeIdx + 1) % items.length;
                items[activeIdx].focus();
                items[activeIdx].classList.add('active');
            }
            else if (key === "Enter" || key === " ") {
                e.preventDefault();
                const activeItem = document.querySelector('.server-item.active');
                if (activeItem) activeItem.click();
            }
            return;
        }
        
        // Normal mode remote controls
        switch(key) {
            case "ArrowLeft":
                e.preventDefault();
                if (filteredChannels.length) {
                    let newIdx = (currentChannelIndex - 1 + filteredChannels.length) % filteredChannels.length;
                    loadChannel(newIdx);
                }
                break;
            case "ArrowRight":
                e.preventDefault();
                if (filteredChannels.length) {
                    let newIdx = (currentChannelIndex + 1) % filteredChannels.length;
                    loadChannel(newIdx);
                }
                break;
            case "ArrowUp":
                e.preventDefault();
                openGuide();
                break;
            case "ArrowDown":
                e.preventDefault();
                openServers();
                break;
            case "Enter":
            case " ":
                e.preventDefault();
                if (video.paused) video.play();
                else video.pause();
                break;
        }
    }
    
    // Double click/tap for favorite toggle
    function onVideoDoubleClick() {
        toggleFavorite();
    }

    function initChannels() {
        // Try to get channels from main.js global variable
        if (typeof channels !== 'undefined' && channels.length) {
            // already have
        } else if (window.channelsData && window.channelsData.length) {
            channels = window.channelsData.map(ch => ({ ...ch, favorite: false }));
        } else {
            channels = [...window.channelsData];
        }
        filteredChannels = [...channels];
        loadChannel(0);
    }

    // Event listeners
    video.addEventListener("dblclick", onVideoDoubleClick);
    window.addEventListener("keydown", handleRemoteKeys);
    
    // Click on video to show hint
    video.addEventListener("click", () => {
        remoteHint.classList.add("visible");
        setTimeout(() => remoteHint.classList.remove("visible"), 2000);
    });
    
    // Initialize
    initChannels();
</script>
</body>
</html>
