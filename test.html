<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>T Play · Live TV OTT Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0f1c;
            color: #f0f3fa;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* custom scroll */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e243b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4f5b8c;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6c7ab0;
        }

        /* header area */
        .top-bar {
            background: rgba(8, 12, 25, 0.85);
            backdrop-filter: blur(14px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0.9rem 2rem;
            border-bottom: 1px solid rgba(72, 87, 138, 0.4);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            height: 44px;
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
        }
        .brand-text {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .search-box {
            background: #12172e;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 260px;
            border: 1px solid #2c345a;
            transition: all 0.2s;
        }
        .search-box:focus-within {
            border-color: #6d85d4;
            box-shadow: 0 0 8px rgba(109, 133, 212, 0.3);
        }
        .search-box i {
            color: #8e9bcb;
            font-size: 1rem;
        }
        #searchInput {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 0.9rem;
            width: 100%;
        }
        #searchInput::placeholder {
            color: #6c7aa5;
        }

        /* category navigation */
        .cats-wrapper {
            padding: 1rem 1.5rem 0.5rem 1.5rem;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .cats-container {
            display: inline-flex;
            gap: 0.7rem;
            flex-wrap: nowrap;
        }
        .cat-btn {
            background: #1b213e;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #2d345a;
            color: #ccd6f0;
        }
        .cat-btn i {
            margin-right: 6px;
            font-size: 0.8rem;
        }
        .cat-btn.active {
            background: #3d4f9e;
            border-color: #7b95ff;
            color: white;
            box-shadow: 0 4px 10px rgba(61, 79, 158, 0.4);
        }
        .cat-btn:hover {
            background: #2a345e;
            transform: translateY(-1px);
        }

        /* main grid */
        .main-container {
            padding: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
        }
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            transition: all 0.2s;
        }
        .channel-card {
            background: #11161f;
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s;
            border: 1px solid #262e48;
            cursor: pointer;
            backdrop-filter: blur(2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .channel-card:hover {
            transform: translateY(-5px);
            border-color: #4f63b0;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.5);
        }
        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #0a0e18;
            transition: all 0.2s;
            display: block;
        }
        .card-info {
            padding: 1rem;
        }
        .channel-name {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .channel-name span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .badge-pkg {
            background: #1f294a;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 30px;
            font-weight: 500;
            color: #aac3ff;
        }
        .channel-desc {
            font-size: 0.75rem;
            color: #9ca3c9;
            margin: 8px 0 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .channel-cat {
            font-size: 0.7rem;
            background: #1b223d;
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            color: #b9c7ff;
        }
        .source-badge {
            font-size: 0.7rem;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #7d89b3;
        }
        .source-badge i {
            font-size: 0.65rem;
        }

        /* no result */
        .no-result {
            text-align: center;
            padding: 3rem;
            background: #101624;
            border-radius: 40px;
            margin-top: 1rem;
            color: #b9c3e6;
        }
        /* player modal (cinematic) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            width: 90%;
            max-width: 1200px;
            background: #0c1020;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid #334066;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: #080c1a;
            border-bottom: 1px solid #242b4a;
        }
        .modal-header h3 {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            transition: 0.1s;
        }
        .close-modal:hover {
            color: #ff8989;
        }
        .video-player {
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
        }
        video, iframe {
            width: 100%;
            height: 100%;
            background: black;
            border: none;
            outline: none;
        }
        .source-selector {
            padding: 1rem 1.5rem;
            background: #0f1424;
            border-top: 1px solid #202842;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .source-label {
            font-size: 0.85rem;
            font-weight: 500;
            background: #19203e;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
        }
        .source-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .src-btn {
            background: #1b213e;
            border: none;
            padding: 0.4rem 1.1rem;
            border-radius: 30px;
            color: #eef3ff;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .src-btn.active-source {
            background: #4a62c9;
            box-shadow: 0 0 6px #5f7bef;
        }
        .src-btn:hover {
            background: #2c376a;
        }
        .error-message {
            color: #ffa098;
            font-size: 0.8rem;
            padding: 0.5rem 1.5rem 1rem;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        @media (max-width: 640px) {
            .top-bar {
                flex-direction: column;
                align-items: stretch;
                padding: 0.8rem 1rem;
            }
            .search-box {
                width: 100%;
            }
            .brand-text {
                font-size: 1.3rem;
            }
            .logo-img {
                height: 36px;
            }
            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 1rem;
            }
            .card-img {
                height: 140px;
            }
            .modal-container {
                width: 95%;
            }
            .source-buttons {
                max-height: 100px;
                overflow-y: auto;
            }
        }
        .footer-note {
            text-align: center;
            padding: 2rem 1rem 1.5rem;
            font-size: 0.7rem;
            color: #5b6690;
            border-top: 1px solid #1a1f36;
            margin-top: 2rem;
        }
        i.fa, i.far, i.fas {
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo-area">
        <img class="logo-img" src="https://i.postimg.cc/RCnCv14W/T-Play.png" alt="T Play Logo" onerror="this.src='https://placehold.co/60x40?text=TPlay'">
        <div class="brand-text">T Play</div>
    </div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search channels by name, category or description...">
    </div>
</div>

<div class="cats-wrapper" id="categoryBar">
    <div class="cats-container" id="categoryList"></div>
</div>

<div class="main-container">
    <div id="channelsGrid" class="channels-grid"></div>
    <div id="noResultMsg" style="display: none;" class="no-result">
        <i class="fas fa-tv" style="font-size: 2rem; opacity: 0.6;"></i>
        <p style="margin-top: 12px;">No channels found 🎬 try different keywords</p>
    </div>
</div>
<div class="footer-note">
    <i class="fas fa-bolt"></i> T Play — Unlimited entertainment • 500+ live TV channels
</div>

<!-- Modal Player -->
<div id="playerModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3><i class="fas fa-play-circle"></i> <span id="modalChannelName">Channel</span></h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="video-player" id="videoPlayerContainer">
            <video id="streamVideo" controls autoplay playsinline webkit-playsinline></video>
        </div>
        <div class="source-selector" id="sourceSelectorPanel">
            <span class="source-label"><i class="fas fa-link"></i> Sources</span>
            <div id="sourceButtonsList" class="source-buttons"></div>
        </div>
        <div id="playerErrorMsg" class="error-message" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i> <span>Unable to load stream. Try another source.</span>
        </div>
    </div>
</div>

<script>
    // global channels array from main.js (injected via file)
    // the main.js file content is already available as 'channels' variable in global scope.
    // we ensure it exists, else fallback (but given the file, it's present)
    let channelData = typeof channels !== 'undefined' ? channels : [];

    // Helper to extract all unique categories (case-insensitive)
    function getAllCategories() {
        const catsSet = new Set();
        channelData.forEach(ch => {
            if (ch.category) catsSet.add(ch.category.trim());
        });
        // sort categories alphabetically
        return Array.from(catsSet).sort((a,b) => a.localeCompare(b));
    }

    // Global state
    let activeCategory = "All";
    let searchTerm = "";
    let currentModalChannel = null;      // full channel object
    let currentSourcesList = [];          // array of {name, url, type, drm?}
    let activeSourceIndex = 0;
    let currentVideoElement = null;
    let modalActive = false;

    // DOM elements
    const channelsGrid = document.getElementById('channelsGrid');
    const noResultDiv = document.getElementById('noResultMsg');
    const searchInput = document.getElementById('searchInput');
    const categoryListDiv = document.getElementById('categoryList');
    const playerModal = document.getElementById('playerModal');
    const modalChannelNameSpan = document.getElementById('modalChannelName');
    const sourceButtonsDiv = document.getElementById('sourceButtonsList');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const streamVideo = document.getElementById('streamVideo');
    const playerErrorMsgDiv = document.getElementById('playerErrorMsg');
    const videoContainer = document.getElementById('videoPlayerContainer');

    // helper: normalize source to hls/dash handling (demo: .m3u8/.mpd)
    function loadStreamBySource(url, type, drm = null) {
        // reset error display
        playerErrorMsgDiv.style.display = 'none';
        // For simplicity, we handle m3u8 and mpd, but since we don't have full DRM engine we try to load with hls.js if needed.
        // but standard video tag can play HLS if browser supports, or we use hls.js for broader compatibility
        if (!streamVideo) return;

        // stop any previous
        if (streamVideo.srcObject) streamVideo.srcObject = null;
        if (streamVideo.src) {
            streamVideo.pause();
            URL.revokeObjectURL(streamVideo.src);
            streamVideo.removeAttribute('src');
        }
        streamVideo.load();
        
        // if dash + drm, just basic because we need advanced DRM but we notify via error gracefully.
        if (type === 'dash') {
            // simplest fallback: try to treat as video/mp4 not works, but we show error, user can pick another source
            // In real world we would integrate dash.js, but for user-friendly OTT demo we show error and fallback to alternative source.
            if (window.dashjs && drm) {
                // optional but we skip heavy integration; just notify that dash drm source limited.
                console.warn('Dash DRM advanced not fully implemented, trying as raw video source');
            }
            // attempt to set as video src (some dash streams not supported)
            streamVideo.src = url;
            streamVideo.play().catch(e => {
                showPlayerError("DRM or format not supported. Try another source.");
            });
        } else {
            // m3u8 or other streams
            if (url.includes('.m3u8') && !streamVideo.canPlayType('application/vnd.apple.mpegurl')) {
                // optional load hls.js for cross-browser
                if (typeof Hls !== 'undefined') {
                    if (window.hlsInstance) window.hlsInstance.destroy();
                    const hls = new Hls();
                    window.hlsInstance = hls;
                    hls.loadSource(url);
                    hls.attachMedia(streamVideo);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        streamVideo.play().catch(e => showPlayerError("Autoplay blocked or network error"));
                    });
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            showPlayerError("HLS error: could not load stream.");
                        }
                    });
                    return;
                } else {
                    streamVideo.src = url;
                    streamVideo.play().catch(e => showPlayerError("Cannot play stream (HLS not natively supported)."));
                }
            } else {
                streamVideo.src = url;
                streamVideo.play().catch(e => showPlayerError("Stream failed: " + (e.message || "network issue")));
            }
        }
        
        // timeout for error detection (if no error but load stalled)
        streamVideo.onerror = (err) => {
            showPlayerError("Media error: invalid source or network.");
        };
    }

    function showPlayerError(msg) {
        playerErrorMsgDiv.style.display = 'flex';
        playerErrorMsgDiv.querySelector('span').innerText = msg;
        setTimeout(() => {
            if (playerErrorMsgDiv.style.display === 'flex') {
                // keep visible but not auto-hide too fast
            }
        }, 3000);
    }

    // load source by index in modal
    function switchSource(index) {
        if (!currentModalChannel || !currentSourcesList[index]) return;
        activeSourceIndex = index;
        const src = currentSourcesList[index];
        // update active button UI
        document.querySelectorAll('.src-btn').forEach((btn, i) => {
            if (i === index) btn.classList.add('active-source');
            else btn.classList.remove('active-source');
        });
        // clear previous error
        playerErrorMsgDiv.style.display = 'none';
        // load stream with appropriate handling
        loadStreamBySource(src.url, src.type || 'hls', src.drm || null);
    }

    // open modal with channel
    function openChannelModal(channel) {
        if (!channel) return;
        currentModalChannel = channel;
        modalChannelNameSpan.innerText = channel.name;
        // build sources list from channel.sources array
        const sources = channel.sources || [];
        if (sources.length === 0) {
            currentSourcesList = [];
            sourceButtonsDiv.innerHTML = '<span style="color:#f0a3a3;">No streaming links available</span>';
            streamVideo.pause();
            streamVideo.removeAttribute('src');
            streamVideo.load();
            playerErrorMsgDiv.style.display = 'flex';
            playerErrorMsgDiv.querySelector('span').innerText = 'This channel has no playable sources.';
            return;
        }
        currentSourcesList = sources.map(s => ({
            name: s.name || 'Source',
            url: s.url,
            type: s.type || (s.url.includes('.mpd') ? 'dash' : 'hls'),
            drm: s.drm || null
        }));
        // render source buttons
        sourceButtonsDiv.innerHTML = '';
        currentSourcesList.forEach((src, idx) => {
            const btn = document.createElement('button');
            btn.className = 'src-btn';
            if (idx === 0) btn.classList.add('active-source');
            btn.innerText = src.name.length > 18 ? src.name.slice(0,15)+'..' : src.name;
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                switchSource(idx);
            });
            sourceButtonsDiv.appendChild(btn);
        });
        // Load first source
        activeSourceIndex = 0;
        const firstSrc = currentSourcesList[0];
        if (firstSrc) {
            loadStreamBySource(firstSrc.url, firstSrc.type || 'hls', firstSrc.drm || null);
        } else {
            playerErrorMsgDiv.style.display = 'flex';
            playerErrorMsgDiv.querySelector('span').innerText = 'No playable source.';
        }
        // show modal
        playerModal.classList.add('active');
        modalActive = true;
    }

    // close modal & stop video
    function closeModal() {
        playerModal.classList.remove('active');
        if (streamVideo) {
            streamVideo.pause();
            if (window.hlsInstance) {
                window.hlsInstance.destroy();
                window.hlsInstance = null;
            }
            streamVideo.removeAttribute('src');
            streamVideo.load();
        }
        currentModalChannel = null;
        modalActive = false;
    }

    // render channel cards based on filters
    function renderChannels() {
        let filtered = [...channelData];
        // category filter (not All)
        if (activeCategory !== "All") {
            filtered = filtered.filter(ch => ch.category === activeCategory);
        }
        // search filter
        if (searchTerm.trim() !== "") {
            const term = searchTerm.trim().toLowerCase();
            filtered = filtered.filter(ch => 
                ch.name.toLowerCase().includes(term) ||
                (ch.description && ch.description.toLowerCase().includes(term)) ||
                (ch.category && ch.category.toLowerCase().includes(term))
            );
        }

        if (filtered.length === 0) {
            channelsGrid.innerHTML = '';
            noResultDiv.style.display = 'block';
            return;
        }
        noResultDiv.style.display = 'none';
        channelsGrid.innerHTML = filtered.map(ch => {
            const imgSrc = ch.img || 'https://placehold.co/400x200/1b1f33/8e9eff?text=No+Image';
            const pkgBadge = (ch.package && ch.package.length) ? ch.package.slice(0,3).join(', ') : 'Free';
            const categoryText = ch.category || 'General';
            const sourcesCount = ch.sources ? ch.sources.length : 0;
            return `
                <div class="channel-card" data-channel-id="${ch.name.replace(/[^a-z0-9]/gi, '_')}" data-channel-index="${filtered.indexOf(ch)}">
                    <img class="card-img" src="${imgSrc}" alt="${ch.name}" loading="lazy" onerror="this.src='https://placehold.co/400x200/2a2f4a/8e9eff?text=TPlay'">
                    <div class="card-info">
                        <div class="channel-name">
                            <span>${escapeHtml(ch.name)}</span>
                            ${pkgBadge !== 'Free' ? `<span class="badge-pkg">${pkgBadge}</span>` : '<span class="badge-pkg" style="background:#2c345a;">FREE</span>'}
                        </div>
                        <div class="channel-desc">${escapeHtml(ch.description || 'No description')}</div>
                        <div><span class="channel-cat"><i class="fas fa-tag"></i> ${escapeHtml(categoryText)}</span></div>
                        <div class="source-badge"><i class="fas fa-server"></i> ${sourcesCount} source${sourcesCount !== 1 ? 's' : ''}</div>
                    </div>
                </div>
            `;
        }).join('');

        // attach click event listeners to each card
        document.querySelectorAll('.channel-card').forEach((card, idx) => {
            const actualFiltered = getCurrentFilteredChannels();
            const channelObj = actualFiltered[idx];
            if (channelObj) {
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openChannelModal(channelObj);
                });
            }
        });
    }

    function getCurrentFilteredChannels() {
        let filtered = [...channelData];
        if (activeCategory !== "All") filtered = filtered.filter(ch => ch.category === activeCategory);
        if (searchTerm.trim() !== "") {
            const term = searchTerm.trim().toLowerCase();
            filtered = filtered.filter(ch => 
                ch.name.toLowerCase().includes(term) ||
                (ch.description && ch.description.toLowerCase().includes(term)) ||
                (ch.category && ch.category.toLowerCase().includes(term))
            );
        }
        return filtered;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // build category list and attach events
    function buildCategories() {
        const categories = getAllCategories();
        categoryListDiv.innerHTML = '';
        const allBtn = document.createElement('div');
        allBtn.className = `cat-btn ${activeCategory === 'All' ? 'active' : ''}`;
        allBtn.innerHTML = '<i class="fas fa-layer-group"></i> All';
        allBtn.addEventListener('click', () => {
            activeCategory = 'All';
            updateCategoryActiveUI();
            renderChannels();
        });
        categoryListDiv.appendChild(allBtn);
        categories.forEach(cat => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${activeCategory === cat ? 'active' : ''}`;
            btn.innerHTML = `<i class="fas fa-tv"></i> ${cat}`;
            btn.addEventListener('click', () => {
                activeCategory = cat;
                updateCategoryActiveUI();
                renderChannels();
            });
            categoryListDiv.appendChild(btn);
        });
    }

    function updateCategoryActiveUI() {
        const btns = document.querySelectorAll('.cat-btn');
        btns.forEach(btn => {
            const txt = btn.innerText.replace(/[★☆\s]/g, '').trim();
            if ((activeCategory === 'All' && (txt === 'All' || btn.innerHTML.includes('All'))) ||
                (activeCategory !== 'All' && btn.innerHTML.includes(activeCategory))) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // search event
    searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderChannels();
    });

    // modal close handlers
    closeModalBtn.addEventListener('click', closeModal);
    playerModal.addEventListener('click', (e) => {
        if (e.target === playerModal) closeModal();
    });
    // additional cleanup on modal close
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalActive) closeModal();
    });

    // load hls.js optionally
    function loadHlsIfNeeded() {
        if (!window.Hls && !document.querySelector('script[src*="hls.js"]')) {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js';
            script.async = true;
            document.head.appendChild(script);
        }
    }

    // init all
    function init() {
        if (!channelData || channelData.length === 0) {
            channelsGrid.innerHTML = `<div class="no-result">⚠️ Channel data not loaded. Please check main.js file.</div>`;
            return;
        }
        buildCategories();
        renderChannels();
        loadHlsIfNeeded();
    }

    init();
</script>
</body>
</html>
