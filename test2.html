<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>T Play - Multi Audio Player</title>
    <link rel="icon" href="https://i.postimg.cc/RCnCv14W/T-Play.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shaka Player CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.12/controls.css">
    <style>
        :root {
            --primary-color: #e50914;
            --primary-gradient: linear-gradient(135deg, #e50914 0%, #b80710 100%);
            --secondary-color: #0071eb;
            --dark-bg: #0f0f13;
            --light-bg: #1a1a23;
            --card-bg: #1e1e29;
            --text-color: #ffffff;
            --text-secondary: #a0a0b0;
            --header-height: 70px;
            --player-aspect: 9/16;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        img {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }

        .main-content {
            display: flex;
            margin-top: 0;
            min-height: 100vh;
        }

        .player-section {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #liveVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        #posterImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: var(--primary-color);
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9;
            flex-direction: column;
            gap: 15px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(229, 9, 20, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 30px;
            z-index: 10;
            opacity: 0;
            transition: var(--transition);
            backdrop-filter: blur(5px);
            align-items: center;
            flex-wrap: wrap;
        }

        .video-container:hover .controls {
            opacity: 1;
        }

        .control-btn, .mute-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 14px;
        }

        .control-btn:hover, .mute-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 16px;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
        }

        .channel-nav {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .quality-select, .audio-select {
            border-radius: 20px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .quality-select option, .audio-select option {
            background: var(--dark-bg);
            color: white;
        }

        .source-select {
            border-radius: 20px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            max-width: 120px;
        }

        .source-select option {
            background: var(--dark-bg);
            color: white;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .volume-slider {
            width: 70px;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
        }

        .channels-sidebar {
            width: 30%;
            max-width: 400px;
            background: var(--light-bg);
            padding: 25px 20px;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            height: calc(100vh - 60px);
            position: sticky;
            top: 30px;
            border-radius: 16px 0 0 16px;
            margin: 10px 0 10px 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) rgba(255, 255, 255, 0.05);
        }

        .channels-sidebar::-webkit-scrollbar { width: 8px; }
        .channels-sidebar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin: 5px;
        }
        .channels-sidebar::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .channel-count {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-color);
        }

        .search-box {
            position: relative;
            margin-bottom: 0px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 30px;
            border: none;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .channel-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            padding: 10px 0;
        }

        .channel-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            aspect-ratio: 1/1;
            width: 100%;
            justify-content: center;
            position: relative;
        }

        .channel-item:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: rgba(229, 9, 20, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .channel-item.active {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, rgba(229, 9, 20, 0.2) 0%, rgba(184, 7, 16, 0.15) 100%);
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
        }

        .channel-item-img {
            width: 100%;
            height: auto;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .channel-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .channel-item-live {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--primary-color);
            color: white;
            font-size: 9px;
            padding: 3px 6px;
            border-radius: 30px;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .drm-badge {
            position: absolute;
            top: -2px;
            left: -2px;
            background: #ff6b00;
            color: white;
            font-size: 8px;
            padding: 1px 3px;
            border-radius: 3px;
            z-index: 3;
            font-weight: bold;
        }

        .category-bar {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 10px;
            padding: 20px 0;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .category-bar::-webkit-scrollbar { display: none; }

        .category-bar button {
            background: var(--card-bg);
            color: var(--text-secondary);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .category-bar button.active {
            background: var(--primary-gradient);
            color: white;
        }

        .tplay-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 18px;
            color: var(--text-color);
        }

        .tplay-logo img {
            width: 50px;
            height: 50px;
            border-radius: 6px;
        }

        .error-message {
            background: rgba(229, 9, 20, 0.2);
            border: 1px solid var(--primary-color);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            display: none;
            color: var(--text-color);
        }

        .protection-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 9999;
            display: none;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-content { flex-direction: column; }
            .player-section {
                max-width: 100%;
                position: sticky;
                top: 0;
                z-index: 100;
                background: var(--dark-bg);
                padding-bottom: 10px;
            }
            .channels-sidebar {
                width: 100%;
                max-width: none;
                height: auto;
                position: relative;
                top: 0;
                border-radius: 16px;
                margin: 10px 0;
            }
        }

        @media (max-width: 768px) {
            .controls { width: 95%; flex-wrap: wrap; justify-content: center; gap: 6px; }
            .control-btn, .mute-btn { width: 30px; height: 30px; font-size: 12px; }
            .quality-select, .audio-select { font-size: 10px; padding: 4px 8px; }
        }
    </style>
</head>
<body>
    <div class="protection-overlay" id="protectionOverlay"></div>

    <div class="main-content">
        <section class="player-section">
            <div class="video-container">
                <img id="posterImage" src="https://i.postimg.cc/Pr9sC68t/T-Play-Cover.jpg" alt="T Play Poster">
                <div id="loadingOverlay">
                    <div class="loading-spinner"></div>
                    <div>Loading...</div>
                </div>

                <video id="liveVideo" playsinline webkit-playsinline></video>

                <div class="controls">
                    <button class="nav-btn" onclick="prevChannel()" title="Previous Channel"><i class="fas fa-chevron-left"></i></button>
                    <button class="control-btn" onclick="togglePlayPause()" id="playPauseBtn" title="Play/Pause"><i class="fas fa-pause"></i></button>
                    <button class="control-btn" onclick="cycleZoom()" title="Change View"><i class="fas fa-expand-alt"></i></button>
                    <button class="control-btn" onclick="unifiedFullscreen()" id="fullscreenBtn" title="Fullscreen"><i class="fas fa-expand"></i></button>
                    <button class="control-btn" onclick="togglePiP()" title="Picture-in-Picture"><i class="fas fa-tv"></i></button>

                    <div class="volume-container">
                        <button class="mute-btn" onclick="toggleMute()" id="muteBtn" title="Mute"><i class="fas fa-volume-up"></i></button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                    </div>

                    <button class="nav-btn" onclick="nextChannel()" title="Next Channel"><i class="fas fa-chevron-right"></i></button>

                    <select class="source-select" id="sourceMenu">
                        <option value="0">Main Source</option>
                    </select>

                    <select class="quality-select" id="qualityMenu">
                        <option value="auto">Auto Quality</option>
                    </select>

                    <!-- NEW MULTI-AUDIO SELECTOR -->
                    <select class="audio-select" id="audioMenu" style="display: none;">
                        <option value="default">Audio Track</option>
                    </select>
                </div>
            </div>

            <div class="error-message" id="errorMessage">
                <p><i class="fas fa-exclamation-triangle"></i> <span id="errorText">Channel failed to load. Please try another channel.</span></p>
            </div>
        </section>

        <aside class="channels-sidebar">
            <div class="sidebar-header">
                <div>
                    <h2 class="section-title">Live Channels</h2>
                    <div class="channel-count" id="channelCount">0 channels</div>
                </div>
                <div class="tplay-logo">
                    <img src="https://i.postimg.cc/RCnCv14W/T-Play.png" alt="T Play Logo">
                </div>
            </div>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search channels..." id="channelSearch">
            </div>

            <div class="category-bar" id="categoryBar"></div>

            <div class="channel-list" id="channelList"></div>
        </aside>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.12/shaka-player.ui.js"></script>

    <script>
        // ==================== PROTECTION ====================
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault(); return false;
            }
        });
        function showProtectionWarning() {}
        setInterval(() => { const widthThreshold = window.outerWidth - window.innerWidth > 160; const heightThreshold = window.outerHeight - window.innerHeight > 160; if (widthThreshold || heightThreshold) {} }, 1000);
        
        // ==================== GLOBALS ====================
        const video = document.getElementById("liveVideo");
        const muteBtn = document.getElementById("muteBtn");
        const playPauseBtn = document.getElementById("playPauseBtn");
        const volumeSlider = document.getElementById("volumeSlider");
        const qualityMenu = document.getElementById("qualityMenu");
        const sourceMenu = document.getElementById("sourceMenu");
        const audioMenu = document.getElementById("audioMenu");
        const channelListDiv = document.getElementById("channelList");
        const channelSearch = document.getElementById("channelSearch");
        const posterImage = document.getElementById("posterImage");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const errorMessageDiv = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        const channelCountSpan = document.getElementById("channelCount");
        const categoryBar = document.getElementById("categoryBar");

        let hls = null;
        let shakaPlayer = null;
        let zoomIndex = 0;
        const zoomModes = ["fill", "cover", "contain"];
        let currentChannelIndex = 0;
        let isPlaying = false;
        let currentCategory = 'all';
        let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        let currentBackupIndex = 0;
        let currentBackupSources = [];
        let filteredChannels = [];
        let channelMap = new Map();
        
        // Audio tracks management
        let currentAudioTrackId = -1;
        let availableAudioTracks = [];

        // ==================== SAMPLE CHANNEL DATA WITH MULTI-AUDIO ====================
        // Each channel can have audioTracks array: [{id, name, language, groupId}] for HLS audio groups
        // For demo, we add multi-language audio to some channels
        const channels = [
            { name: "Star Plus", img: "https://i.postimg.cc/Pr9sC68t/T-Play-Cover.jpg", category: ["Entertainment", "Hindi"], sources: [{ name: "Source 1", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls", audioTracks: [{ id: 0, name: "Hindi", language: "hi" }, { id: 1, name: "English", language: "en" }, { id: 2, name: "Tamil", language: "ta" }] }] },
            { name: "CNN News", img: "https://i.postimg.cc/Pr9sC68t/T-Play-Cover.jpg", category: ["News", "English"], sources: [{ name: "Source 1", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls", audioTracks: [{ id: 0, name: "English", language: "en" }, { id: 1, name: "Spanish", language: "es" }] }] },
            { name: "Sony TV", img: "https://i.postimg.cc/Pr9sC68t/T-Play-Cover.jpg", category: ["Entertainment", "Hindi"], sources: [{ name: "Source 1", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls", audioTracks: [{ id: 0, name: "Hindi", language: "hi" }, { id: 1, name: "English", language: "en" }] }] },
            { name: "MTV Beats", img: "https://i.postimg.cc/Pr9sC68t/T-Play-Cover.jpg", category: ["Music", "Hindi"], sources: [{ name: "Source 1", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls", audioTracks: [] }] },
            { name: "BBC World", img: "https://i.postimg.cc/Pr9sC68t/T-Play-Cover.jpg", category: ["News", "English"], sources: [{ name: "Source 1", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", type: "hls", audioTracks: [{ id: 0, name: "English", language: "en" }, { id: 1, name: "Arabic", language: "ar" }] }] }
        ];

        // ==================== MULTI-AUDIO FUNCTIONS (HLS & Native) ====================
        function updateAudioMenu(tracks) {
            audioMenu.innerHTML = "";
            if (!tracks || tracks.length === 0) {
                audioMenu.style.display = "none";
                return;
            }
            audioMenu.style.display = "inline-block";
            tracks.forEach((track, idx) => {
                const option = document.createElement("option");
                option.value = idx;
                option.textContent = track.name || (track.language ? track.language.toUpperCase() : `Audio ${idx+1}`);
                if (currentAudioTrackId === idx) option.selected = true;
                audioMenu.appendChild(option);
            });
            // If no track selected, select first
            if (currentAudioTrackId === -1 && tracks.length > 0) {
                currentAudioTrackId = 0;
                audioMenu.value = "0";
                setAudioTrack(0);
            }
        }

        function setAudioTrack(trackIndex) {
            if (!hls && !shakaPlayer) {
                // Try native if HLS not active
                if (video.audioTracks && video.audioTracks.length > trackIndex) {
                    for (let i = 0; i < video.audioTracks.length; i++) {
                        video.audioTracks[i].enabled = (i === trackIndex);
                    }
                    currentAudioTrackId = trackIndex;
                }
                return;
            }
            
            if (hls && hls.audioTracks && hls.audioTracks.length > trackIndex) {
                hls.audioTrack = trackIndex;
                currentAudioTrackId = trackIndex;
                console.log("Switched HLS audio track to index:", trackIndex, hls.audioTracks[trackIndex]);
            } else if (shakaPlayer && shakaPlayer.getVariantTracks) {
                // Shaka player variant audio selection
                const tracks = shakaPlayer.getVariantTracks();
                const audioVariants = tracks.filter(t => t.type === 'variant' && t.active && t.audio);
                if (audioVariants.length > trackIndex) {
                    shakaPlayer.selectVariantTrack(audioVariants[trackIndex]);
                    currentAudioTrackId = trackIndex;
                }
            }
        }

        // Listen to HLS audio track changes
        function attachHlsAudioListener() {
            if (!hls) return;
            hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, (event, data) => {
                if (data.audioTracks && data.audioTracks.length > 0) {
                    const trackList = data.audioTracks.map((track, idx) => ({
                        id: idx,
                        name: track.name || track.lang || `Track ${idx+1}`,
                        language: track.lang
                    }));
                    availableAudioTracks = trackList;
                    updateAudioMenu(trackList);
                    if (currentAudioTrackId === -1 && trackList.length > 0) {
                        setAudioTrack(0);
                    }
                } else {
                    audioMenu.style.display = "none";
                }
            });
            
            hls.on(Hls.Events.AUDIO_TRACK_SWITCHED, (event, data) => {
                currentAudioTrackId = data.id;
                if (audioMenu) audioMenu.value = data.id;
            });
        }

        // Shaka audio tracks handling
        function attachShakaAudioListener() {
            if (!shakaPlayer) return;
            shakaPlayer.addEventListener('variantchanged', () => {
                const tracks = shakaPlayer.getVariantTracks();
                const activeAudio = tracks.filter(t => t.active && t.audio);
                if (activeAudio.length) {
                    // Build menu from all audio variants
                    const audioVariants = tracks.filter(t => t.audio && t.language);
                    const unique = [];
                    const map = new Map();
                    audioVariants.forEach((t, idx) => {
                        if (!map.has(t.language)) {
                            map.set(t.language, { id: idx, name: t.language.toUpperCase(), lang: t.language });
                            unique.push({ id: idx, name: t.language.toUpperCase(), language: t.language });
                        }
                    });
                    if (unique.length) updateAudioMenu(unique);
                }
            });
        }

        // ==================== LOAD SOURCE WITH AUDIO SUPPORT ====================
        function loadSource(sourceIndex) {
            cleanupPlayers();
            const source = currentBackupSources[sourceIndex];
            if (!source) { showError("No source available"); return; }
            currentChannelUrl = source.url;
            currentBackupIndex = sourceIndex;
            loadingOverlay.style.display = "flex";
            errorMessageDiv.style.display = "none";
            audioMenu.style.display = "none";
            currentAudioTrackId = -1;
            
            // Predefined audio tracks from channel data (if any)
            let predefinedAudio = source.audioTracks || [];
            
            if (source.type === 'dash') {
                if (!shakaPlayer) shakaPlayer = initShakaPlayer();
                if (!shakaPlayer) { showError('Shaka init failed'); loadingOverlay.style.display = "none"; tryNextBackup(); return; }
                if (source.drm) { shakaPlayer.configure({ drm: { clearKeys: { [source.drm.kid]: source.drm.key } } }); }
                shakaPlayer.load(source.url).then(() => {
                    loadingOverlay.style.display = "none";
                    video.play().catch(e => console.error(e));
                    attachShakaAudioListener();
                    if (predefinedAudio.length) updateAudioMenu(predefinedAudio);
                }).catch(() => { loadingOverlay.style.display = "none"; tryNextBackup(); });
                return;
            }
            
            // HLS PLAYER
            if (Hls.isSupported() && !isIOS) {
                hls = new Hls({ maxBufferLength: 30, backBufferLength: 30, enableWorker: true, lowLatencyMode: true });
                hls.loadSource(source.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    populateQualityMenu();
                    video.play().catch(e => console.error(e));
                    // After manifest parse, check audio tracks
                    if (hls.audioTracks && hls.audioTracks.length > 0) {
                        const tracksFromHls = hls.audioTracks.map((track, idx) => ({ id: idx, name: track.name || track.lang || `Audio ${idx+1}`, language: track.lang }));
                        if (tracksFromHls.length) {
                            updateAudioMenu(tracksFromHls);
                        } else if (predefinedAudio.length) {
                            updateAudioMenu(predefinedAudio);
                        }
                    } else if (predefinedAudio.length) {
                        updateAudioMenu(predefinedAudio);
                    } else {
                        audioMenu.style.display = "none";
                    }
                    attachHlsAudioListener();
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if(data.type === Hls.ErrorTypes.NETWORK_ERROR) tryNextBackup();
                        else if(data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                        else tryNextBackup();
                    }
                });
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = source.url;
                video.addEventListener("loadedmetadata", () => {
                    video.play().catch(e => console.error(e));
                    // Native audio tracks for iOS Safari
                    if (video.audioTracks && video.audioTracks.length) {
                        const nativeTracks = [];
                        for (let i = 0; i < video.audioTracks.length; i++) {
                            const track = video.audioTracks[i];
                            nativeTracks.push({ id: i, name: track.label || track.language || `Track ${i+1}`, language: track.language });
                        }
                        if (nativeTracks.length) updateAudioMenu(nativeTracks);
                        else if (predefinedAudio.length) updateAudioMenu(predefinedAudio);
                    } else if (predefinedAudio.length) {
                        updateAudioMenu(predefinedAudio);
                    }
                });
            } else {
                showError("HLS not supported");
            }
        }

        function initShakaPlayer() {
            if (!shaka.Player.isBrowserSupported()) { console.error('Shaka not supported'); return null; }
            const player = new shaka.Player(video);
            player.configure({ drm: { servers: {} }, streaming: { bufferingGoal: 30 } });
            player.addEventListener('error', () => { loadingOverlay.style.display = "none"; tryNextBackup(); });
            return player;
        }

        function cleanupPlayers() {
            if (hls) { hls.destroy(); hls = null; }
            if (shakaPlayer) { shakaPlayer.unload(); shakaPlayer.destroy(); shakaPlayer = null; }
            video.src = "";
            video.load();
            audioMenu.style.display = "none";
            audioMenu.innerHTML = "<option value='default'>Audio Track</option>";
            currentAudioTrackId = -1;
        }

        function tryNextBackup() {
            currentBackupIndex++;
            if (currentBackupIndex < currentBackupSources.length) loadSource(currentBackupIndex);
            else showError("No Signal");
        }

        function populateQualityMenu() {
            if (!hls) return;
            qualityMenu.innerHTML = "";
            const autoOption = document.createElement("option");
            autoOption.value = -1;
            autoOption.textContent = "Auto";
            qualityMenu.appendChild(autoOption);
            if (hls.levels && hls.levels.length > 1) {
                hls.levels.forEach((level, index) => {
                    const option = document.createElement("option");
                    option.value = index;
                    option.textContent = level.height + "p";
                    qualityMenu.appendChild(option);
                });
                hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => { qualityMenu.value = data.level; });
            } else { qualityMenu.style.display = "none"; }
        }

        // ==================== UI CONTROLS ====================
        function togglePlayPause() { video.paused ? video.play() : video.pause(); }
        function toggleMute() {
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            volumeSlider.value = video.muted ? 0 : video.volume;
        }
        function cycleZoom() { zoomIndex = (zoomIndex + 1) % zoomModes.length; video.style.objectFit = zoomModes[zoomIndex]; }
        function unifiedFullscreen() {
            if (video.webkitEnterFullscreen && isIOS) video.webkitEnterFullscreen();
            else if (video.requestFullscreen) video.requestFullscreen().catch(() => document.querySelector('.video-container').requestFullscreen());
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        }
        function togglePiP() { if (document.pictureInPictureElement) document.exitPictureInPicture(); else video.requestPictureInPicture().catch(e => console.log(e)); }
        function nextChannel() { const next = (currentChannelIndex + 1) % filteredChannels.length; loadChannel(next); }
        function prevChannel() { const prev = (currentChannelIndex - 1 + filteredChannels.length) % filteredChannels.length; loadChannel(prev); }
        function showError(msg) { errorText.textContent = msg; errorMessageDiv.style.display = "block"; loadingOverlay.style.display = "none"; }

        function loadChannel(index) {
            document.querySelectorAll(".channel-item").forEach(item => item.classList.remove("active"));
            if (channelMap.has(index)) channelMap.get(index).classList.add("active");
            const channel = filteredChannels[index];
            currentChannelIndex = index;
            currentBackupSources = channel.sources;
            currentBackupIndex = 0;
            sourceMenu.innerHTML = "";
            channel.sources.forEach((src, i) => {
                const opt = document.createElement("option");
                opt.value = i;
                opt.textContent = src.name + (src.drm ? " (DRM)" : "");
                sourceMenu.appendChild(opt);
            });
            loadSource(0);
        }

        function filterCategory(category, btnElement) {
            document.querySelectorAll('.category-bar button').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            currentCategory = category;
            loadChannels();
        }

        function filterChannels() {
            const term = channelSearch.value.toLowerCase();
            document.querySelectorAll(".channel-item").forEach(item => {
                const name = item.title.toLowerCase();
                item.style.display = name.includes(term) ? "flex" : "none";
            });
        }

        function loadChannels() {
            channelListDiv.innerHTML = "";
            filteredChannels = channels.filter(ch => currentCategory === 'all' || ch.category.includes(currentCategory));
            filteredChannels.forEach((channel, idx) => {
                const div = document.createElement("div");
                div.className = "channel-item";
                const hasDrm = channel.sources.some(s => s.drm);
                div.innerHTML = `<div class="channel-item-img"><img src="${channel.img}" alt="${channel.name}">${hasDrm ? '<span class="drm-badge"></span>' : ''}<span class="channel-item-live"></span></div>`;
                div.addEventListener("click", () => loadChannel(idx));
                div.title = channel.name;
                channelListDiv.appendChild(div);
                channelMap.set(idx, div);
            });
            channelCountSpan.textContent = `${filteredChannels.length} channels`;
        }

        function buildCategoryButtons() {
            const cats = ["all", "News", "Entertainment", "Music", "Hindi", "English", "Sports"];
            cats.forEach(cat => {
                const btn = document.createElement("button");
                btn.textContent = cat === "all" ? "All" : cat;
                if (cat === "all") btn.classList.add("active");
                btn.onclick = (e) => filterCategory(cat, btn);
                categoryBar.appendChild(btn);
            });
        }

        // ==================== INIT & EVENT LISTENERS ====================
        function initPlayer() {
            volumeSlider.addEventListener("input", function() { video.volume = this.value; if(video.volume === 0) muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>'; else muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>'; video.muted = false; });
            video.addEventListener("play", () => { playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; posterImage.style.display = "none"; });
            video.addEventListener("pause", () => { playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; });
            video.addEventListener("waiting", () => { loadingOverlay.style.display = "flex"; });
            video.addEventListener("playing", () => { loadingOverlay.style.display = "none"; errorMessageDiv.style.display = "none"; });
            video.addEventListener("error", () => { loadingOverlay.style.display = "none"; tryNextBackup(); });
            channelSearch.addEventListener("input", filterChannels);
            qualityMenu.addEventListener("change", function() { if (hls) hls.currentLevel = parseInt(this.value); });
            sourceMenu.addEventListener("change", function() { loadSource(parseInt(this.value)); });
            // Audio track change
            audioMenu.addEventListener("change", function() { const val = parseInt(this.value); if (!isNaN(val)) setAudioTrack(val); });
            buildCategoryButtons();
            loadChannels();
            if (channels.length) loadChannel(0);
        }

        window.addEventListener("load", initPlayer);
        if (isIOS) { video.setAttribute("playsinline", "true"); video.setAttribute("webkit-playsinline", "true"); }
    </script>
</body>
</html>
